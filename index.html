<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>AIPLAT – AI Tools Directory</title>
  <meta name="description" content="Best AI tools in one place">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 40px;
      color: #111;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    h2 {
      color: #666;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin-top: 0;
    }

    .card p {
      color: #666;
    }

    .card a {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }

    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>AIPLAT</h1>
  <h2>AI Tools Directory</h2>

  <div class="grid">

    <div class="card">
      <h3>ChatGPT</h3>
      <p>AI chatbot for writing and coding</p>
      <a href="https://chat.openai.com" target="_blank">Open</a>
    </div>

    <div class="card">
      <h3>Midjourney</h3>
      <p>AI image generator</p>
      <a href="https://www.midjourney.com" target="_blank">Open</a>
    </div>

    <div class="card">
      <h3>Runway</h3>
      <p>AI video generation</p>
      <a href="https://runwayml.com" target="_blank">Open</a>
    </div>

    <div class="card">
      <h3>ElevenLabs</h3>
      <p>AI voice generator</p>
      <a href="https://elevenlabs.io" target="_blank">Open</a>
    </div>

  </div>
</div>

</body>
</html>
